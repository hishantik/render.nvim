<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200">
  <defs>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#00d9ff"/>
      <stop offset="100%" stop-color="#e94560"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Layout: center=360, editor x:80..160, stream x:160..560, browser x:560..640 -->

  <!-- === EDITOR ICON (left) === -->
  <g transform="translate(80, 30)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="90" rx="8" fill="#1a1b26" stroke="#7aa2f7" stroke-width="1.5"/>
    <rect x="0" y="0" width="80" height="20" rx="8" fill="#24283b"/>
    <rect x="0" y="12" width="80" height="8" fill="#24283b"/>
    <circle cx="12" cy="10" r="3.5" fill="#f7768e"/>
    <circle cx="24" cy="10" r="3.5" fill="#e0af68"/>
    <circle cx="36" cy="10" r="3.5" fill="#9ece6a"/>
    <rect x="10" y="28" width="35" height="4" rx="2" fill="#7aa2f7" opacity="0.9">
      <animate attributeName="width" values="0;35" dur="1.5s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="10" y="38" width="50" height="4" rx="2" fill="#9ece6a" opacity="0.7">
      <animate attributeName="width" values="0;50" dur="1.5s" repeatCount="indefinite" begin="0.2s"/>
    </rect>
    <rect x="10" y="48" width="25" height="4" rx="2" fill="#bb9af7" opacity="0.8">
      <animate attributeName="width" values="0;25" dur="1.5s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <rect x="10" y="58" width="42" height="4" rx="2" fill="#e0af68" opacity="0.7">
      <animate attributeName="width" values="0;42" dur="1.5s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="10" y="68" width="30" height="4" rx="2" fill="#7aa2f7" opacity="0.6">
      <animate attributeName="width" values="0;30" dur="1.5s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <rect x="10" y="26" width="1.5" height="10" fill="#c0caf5">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- === DATA STREAM (middle, centered between icons) === -->
  <!-- Stream starts at editor right edge (160) and ends at browser left edge (560) -->
  <!-- Local coords: 0..400 maps to global 160..560 -->
  <g transform="translate(160, 65)">
    <path d="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"
          fill="none" stroke="url(#streamGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>

    <!-- Primary particles -->
    <circle r="4" fill="#7aa2f7" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="0s"/>
    </circle>

    <circle r="3.5" fill="#00d9ff" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0.7s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.7s"/>
      <animate attributeName="r" values="2;4.5;2" dur="2s" repeatCount="indefinite" begin="0.7s"/>
    </circle>

    <circle r="3" fill="#e94560" filter="url(#glow)">
      <animateMotion dur="2s" repeatCount="indefinite" begin="1.4s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.4s"/>
      <animate attributeName="r" values="2.5;5;2.5" dur="2s" repeatCount="indefinite" begin="1.4s"/>
    </circle>

    <!-- Trailing particles -->
    <circle r="1.5" fill="#7aa2f7" opacity="0.5">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0.15s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
    </circle>
    <circle r="1.5" fill="#00d9ff" opacity="0.5">
      <animateMotion dur="2s" repeatCount="indefinite" begin="0.85s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
    </circle>
    <circle r="1.5" fill="#e94560" opacity="0.5">
      <animateMotion dur="2s" repeatCount="indefinite" begin="1.55s"
        path="M0,10 C50,-10 100,30 150,10 C200,-10 250,30 300,10 C350,-10 380,10 400,10"/>
    </circle>

    <!-- Speed lines -->
    <line x1="100" y1="8" x2="120" y2="8" stroke="#7aa2f7" stroke-width="1" opacity="0.4" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </line>
    <line x1="260" y1="12" x2="280" y2="12" stroke="#00d9ff" stroke-width="1" opacity="0.4" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.6;0" dur="2s" repeatCount="indefinite" begin="1s"/>
    </line>
  </g>

  <!-- === BROWSER ICON (right) === -->
  <g transform="translate(560, 30)" filter="url(#shadow)">
    <rect x="0" y="0" width="80" height="90" rx="8" fill="#1a1b26" stroke="#e94560" stroke-width="1.5"/>
    <rect x="0" y="0" width="80" height="20" rx="8" fill="#24283b"/>
    <rect x="0" y="12" width="80" height="8" fill="#24283b"/>
    <circle cx="12" cy="10" r="3.5" fill="#f7768e"/>
    <circle cx="24" cy="10" r="3.5" fill="#e0af68"/>
    <circle cx="36" cy="10" r="3.5" fill="#9ece6a"/>
    <rect x="44" y="6" width="28" height="8" rx="3" fill="#414868"/>
    <rect x="8" y="26" width="64" height="8" rx="2" fill="#414868">
      <animate attributeName="fill" values="#414868;#7aa2f7;#414868" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <rect x="8" y="40" width="30" height="20" rx="2" fill="#24283b">
      <animate attributeName="fill" values="#24283b;#9ece6a40;#24283b" dur="2s" repeatCount="indefinite" begin="0.7s"/>
    </rect>
    <rect x="42" y="40" width="30" height="9" rx="2" fill="#24283b">
      <animate attributeName="fill" values="#24283b;#7aa2f740;#24283b" dur="2s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <rect x="42" y="53" width="30" height="7" rx="2" fill="#24283b">
      <animate attributeName="fill" values="#24283b;#bb9af740;#24283b" dur="2s" repeatCount="indefinite" begin="1.1s"/>
    </rect>
    <rect x="8" y="66" width="64" height="6" rx="2" fill="#414868"/>
    <rect x="8" y="76" width="45" height="6" rx="2" fill="#414868"/>
    <circle cx="72" cy="6" r="3" fill="#9ece6a">
      <animate attributeName="r" values="2;4;2" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === TITLE TEXT (properly centered at 360) === -->
  <text x="360" y="140" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace"
        font-size="42" font-weight="700" letter-spacing="-1">
    <tspan fill="#c0caf5">render</tspan><tspan fill="#7aa2f7">.nvim</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="0s"/>
  </text>

  <!-- Underline animation -->
  <line x1="220" y1="150" x2="220" y2="150" stroke="#7aa2f7" stroke-width="2" stroke-linecap="round">
    <animate attributeName="x2" values="220;500" dur="1s" fill="freeze" begin="0.5s"/>
    <animate attributeName="opacity" values="0;1" dur="0.2s" fill="freeze" begin="0.5s"/>
  </line>

  <!-- === TAGLINE (centered) === -->
  <text x="360" y="170" text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'SF Mono', monospace"
        font-size="13" fill="#565f89" letter-spacing="2">
    LIVE PREVIEW FOR NEOVIM
    <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze" begin="1s"/>
  </text>

  <!-- === TECH BADGES (centered) === -->
  <text x="360" y="190" text-anchor="middle"
        font-family="monospace" font-size="10" letter-spacing="1">
    <tspan fill="#7aa2f7" opacity="0.7">NEOVIM</tspan>
    <tspan fill="#565f89" opacity="0.4">  |  </tspan>
    <tspan fill="#9ece6a" opacity="0.7">PYTHON</tspan>
    <tspan fill="#565f89" opacity="0.4">  |  </tspan>
    <tspan fill="#e0af68" opacity="0.7">NODE.JS</tspan>
    <tspan fill="#565f89" opacity="0.4">  |  </tspan>
    <tspan fill="#e94560" opacity="0.7">WEBSOCKET</tspan>
    <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.2s"/>
  </text>
</svg>
