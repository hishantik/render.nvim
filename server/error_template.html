<!doctype html>
<html>
<head>
	<title>%TITLE%</title>
	<style type="text/css">
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
	color: #e4e4e4;
	font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
	height: 100vh;
	display: flex;
	justify-content: center;
	align-items: center;
	overflow: hidden;
}

#canvas-container {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	z-index: 0;
}

.content {
	position: relative;
	z-index: 1;
	text-align: center;
	max-width: 600px;
	padding: 2rem;
}

#logo {
	font-size: 4em;
	color: #e94560;
	font-weight: 700;
	text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
	margin-bottom: 1rem;
	animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
	0%, 100% { transform: scale(1); opacity: 1; }
	50% { transform: scale(1.05); opacity: 0.8; }
}

#message h1 {
	font-size: 2.5rem;
	margin-bottom: 0.5rem;
	color: #fff;
	text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

#message p {
	font-size: 1.1rem;
	line-height: 1.6;
	color: #a0a0a0;
	background: rgba(255,255,255,0.05);
	padding: 1rem;
	border-radius: 8px;
	border: 1px solid rgba(255,255,255,0.1);
	max-width: 100%;
	word-break: break-all;
	font-family: 'Consolas', 'Monaco', monospace;
}

/* CSS Fallback Animation - shows when 3D fails to load */
.fallback-bg {
	position: fixed;
	top: 0;
	left: 0;
	width: 100%;
	height: 100%;
	z-index: 0;
	overflow: hidden;
}

.floating-shape {
	position: absolute;
	border-radius: 50%;
	opacity: 0.3;
	animation: float 6s ease-in-out infinite;
}

.floating-shape:nth-child(1) {
	width: 300px;
	height: 300px;
	background: radial-gradient(circle, #e94560 0%, transparent 70%);
	top: 10%;
	left: 10%;
	animation-delay: 0s;
}

.floating-shape:nth-child(2) {
	width: 200px;
	height: 200px;
	background: radial-gradient(circle, #533483 0%, transparent 70%);
	top: 60%;
	right: 15%;
	animation-delay: -2s;
}

.floating-shape:nth-child(3) {
	width: 250px;
	height: 250px;
	background: radial-gradient(circle, #0f3460 0%, transparent 70%);
	bottom: 20%;
	left: 30%;
	animation-delay: -4s;
}

.floating-shape:nth-child(4) {
	width: 150px;
	height: 150px;
	background: radial-gradient(circle, #00d9ff 0%, transparent 70%);
	top: 30%;
	right: 40%;
	animation-delay: -1s;
}

@keyframes float {
	0%, 100% { transform: translateY(0) scale(1); }
	50% { transform: translateY(-30px) scale(1.1); }
}

/* Hide fallback when 3D is active */
#canvas-container:has(canvas) + .content + .fallback-bg,
.scene-ready .fallback-bg {
	display: none;
}

.scene-active #canvas-container {
	display: block;
}
	</style>
</head>
<body>
	<div id="canvas-container"></div>
	<div class="fallback-bg">
		<div class="floating-shape"></div>
		<div class="floating-shape"></div>
		<div class="floating-shape"></div>
		<div class="floating-shape"></div>
	</div>
	<div class="content">
		<div id="logo">{render}</div>
		<div id="message">
			<h1>%TITLE%</h1>
			<p>%DETAILS%</p>
		</div>
	</div>
	<script>
		// Detect offline capability
		var isOnline = navigator.onLine;

		// Try loading Three.js
		function loadThreeJS() {
			return new Promise(function(resolve, reject) {
				var script = document.createElement('script');
				script.type = 'module';

				var importMap = document.createElement('script');
				importMap.type = 'importmap';
				importMap.textContent = JSON.stringify({
					imports: {
						'three': 'https://unpkg.com/three@0.160.0/build/three.module.js'
					}
				});

				document.head.appendChild(importMap);

				script.textContent = [
					"import * as THREE from 'three';",
					"",
					"let scene, camera, renderer;",
					"let particles, shapes = [];",
					"let mouseX = 0, mouseY = 0;",
					"let targetMouseX = 0, targetMouseY = 0;",
					"",
					"function init() {",
					"	const container = document.getElementById('canvas-container');",
					"	if (!container) return;",
					"",
					"	scene = new THREE.Scene();",
					"	scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);",
					"",
					"	camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);",
					"	camera.position.z = 50;",
					"",
					"	renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });",
					"	renderer.setSize(window.innerWidth, window.innerHeight);",
					"	renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));",
					"	container.appendChild(renderer.domElement);",
					"	document.body.classList.add('scene-active');",
					"",
					"	createParticles();",
					"	createFloatingShapes();",
					"",
					"	document.addEventListener('mousemove', onMouseMove);",
					"	window.addEventListener('resize', onWindowResize);",
					"",
					"	animate();",
					"}",
					"",
					"function createParticles() {",
					"	const particleCount = 2000;",
					"	const positions = new Float32Array(particleCount * 3);",
					"	const colors = new Float32Array(particleCount * 3);",
					"",
					"	const colorPalette = [",
					"		new THREE.Color(0xe94560),",
					"		new THREE.Color(0x533483),",
					"		new THREE.Color(0x0f3460),",
					"		new THREE.Color(0x00d9ff)",
					"	];",
					"",
					"	for (let i = 0; i < particleCount; i++) {",
					"		const i3 = i * 3;",
					"		positions[i3] = (Math.random() - 0.5) * 150;",
					"		positions[i3 + 1] = (Math.random() - 0.5) * 150;",
					"		positions[i3 + 2] = (Math.random() - 0.5) * 100;",
					"",
					"		const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];",
					"		colors[i3] = color.r;",
					"		colors[i3 + 1] = color.g;",
					"		colors[i3 + 2] = color.b;",
					"	}",
					"",
					"	const geometry = new THREE.BufferGeometry();",
					"	geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));",
					"	geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));",
					"",
					"	const material = new THREE.PointsMaterial({",
					"		size: 0.8,",
					"		vertexColors: true,",
					"		transparent: true,",
					"		opacity: 0.8,",
					"		sizeAttenuation: true",
					"	});",
					"",
					"	particles = new THREE.Points(geometry, material);",
					"	scene.add(particles);",
					"}",
					"",
					"function createFloatingShapes() {",
					"	const shapeTypes = [",
					"		() => new THREE.TetrahedronGeometry(2),",
					"		() => new THREE.OctahedronGeometry(1.5),",
					"		() => new THREE.IcosahedronGeometry(1.2),",
					"		() => new THREE.TorusGeometry(1, 0.4, 8, 16)",
					"	];",
					"",
					"	const colorPalette = [0xe94560, 0x533483, 0x0f3460, 0x00d9ff];",
					"",
					"	for (let i = 0; i < 40; i++) {",
					"		const geometry = shapeTypes[Math.floor(Math.random() * shapeTypes.length)]();",
					"		const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];",
					"		const material = new THREE.MeshPhongMaterial({",
					"			color: color,",
					"			transparent: true,",
					"			opacity: 0.6,",
					"			flatShading: true",
					"		});",
					"",
					"		const mesh = new THREE.Mesh(geometry, material);",
					"		mesh.position.set(",
					"			(Math.random() - 0.5) * 100,",
					"			(Math.random() - 0.5) * 80,",
					"			(Math.random() - 0.5) * 60",
					"		);",
					"		mesh.rotation.set(",
					"			Math.random() * Math.PI,",
					"			Math.random() * Math.PI,",
					"			Math.random() * Math.PI",
					"		);",
					"		mesh.userData = {",
					"			rotationSpeed: {",
					"				x: (Math.random() - 0.5) * 0.02,",
					"				y: (Math.random() - 0.5) * 0.02,",
					"				z: (Math.random() - 0.5) * 0.02",
					"			},",
					"			floatSpeed: Math.random() * 0.5 + 0.5,",
					"			floatOffset: Math.random() * Math.PI * 2,",
					"			originalY: mesh.position.y",
					"		};",
					"",
					"		shapes.push(mesh);",
					"		scene.add(mesh);",
					"	}",
					"}",
					"",
					"function onMouseMove(event) {",
					"	targetMouseX = (event.clientX / window.innerWidth) * 2 - 1;",
					"	targetMouseY = -(event.clientY / window.innerHeight) * 2 + 1;",
					"}",
					"",
					"function onWindowResize() {",
					"	camera.aspect = window.innerWidth / window.innerHeight;",
					"	camera.updateProjectionMatrix();",
					"	renderer.setSize(window.innerWidth, window.innerHeight);",
					"}",
					"",
					"function animate() {",
					"	requestAnimationFrame(animate);",
					"",
					"	mouseX += (targetMouseX - mouseX) * 0.05;",
					"	mouseY += (targetMouseY - mouseY) * 0.05;",
					"",
					"	camera.position.x += (mouseX * 10 - camera.position.x) * 0.02;",
					"	camera.position.y += (mouseY * 10 - camera.position.y) * 0.02;",
					"	camera.lookAt(scene.position);",
					"",
					"	const time = Date.now() * 0.001;",
					"",
					"	if (particles) {",
					"		particles.rotation.y += 0.0003;",
					"		particles.rotation.x += 0.0001;",
					"	}",
					"",
					"	shapes.forEach((shape) => {",
					"		shape.rotation.x += shape.userData.rotationSpeed.x;",
					"		shape.rotation.y += shape.userData.rotationSpeed.y;",
					"		shape.rotation.z += shape.userData.rotationSpeed.z;",
					"",
					"		shape.position.y = shape.userData.originalY +",
					"			Math.sin(time * shape.userData.floatSpeed + shape.userData.floatOffset) * 2;",
					"	});",
					"",
					"	renderer.render(scene, camera);",
					"}",
					"",
					"init();"
				].join('\n');

				script.onerror = function() { reject(new Error('Failed to load Three.js')); };
				script.onload = function() { resolve(); };

				setTimeout(function() { reject(new Error('Timeout')); }, 3000);
				document.head.appendChild(script);
			});
		}

		if (isOnline) {
			loadThreeJS().catch(function() {
				// Three.js failed, CSS fallback shows automatically
			});
		}
	</script>
</body>
</html>
